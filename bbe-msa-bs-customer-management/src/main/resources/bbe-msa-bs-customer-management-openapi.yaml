openapi: 3.0.3
info:
  title: bbe-msa-bs-customer-management
  version: 1.2.1
  description: |
    Microservice for managing customers and their person profile data.

    Notes:
    - Customer identifiers are UUIDs.
    - Personal identification is unique across persons.
    - Pagination is zero-based and uses `page` + `size`.
    - Responses MAY include `X-Total-Count` and RFC 5988 `Link` headers for navigation.
    - This API uses RFC 7807 Problem Details for errors (`application/problem+json`).

servers:
  - url: /api

tags:
  - name: Customers
    description: Customer management

paths:
  /customers:
    get:
      tags: [Customers]
      operationId: listCustomers
      summary: List customers
      description: Returns a paginated list of customers with optional filtering.
      parameters:
        - name: page
          in: query
          description: Zero-based page index.
          schema: { type: integer, minimum: 0, default: 0 }
        - name: size
          in: query
          description: Page size.
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: state
          in: query
          required: false
          description: Filter customers by active/inactive state.
          schema: { type: boolean }
        - name: identification
          in: query
          required: false
          description: Filter by exact personal identification.
          schema:
            type: string
            minLength: 3
            maxLength: 50
        - name: name
          in: query
          required: false
          description: Filter by name (case-insensitive contains).
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        "200":
          description: OK
          headers:
            X-Total-Count:
              description: Total items matching the query.
              schema: { type: integer, minimum: 0 }
            Link:
              description: RFC 5988 links for paginated navigation (rel="next","prev")
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CustomerResponse' }
        "400":
          description: Invalid query parameters
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    post:
      tags: [Customers]
      operationId: createCustomer
      summary: Create customer
      description: |
        Creates a new customer and the associated person profile.

        Conflicts:
        - `identification` must be unique.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerCreateRequest' }
            examples:
              ok:
                value:
                  name: "Jose Lema"
                  gender: "M"
                  age: 30
                  identification: "EC-0102030405"
                  address: "Otavalo, Ecuador"
                  phoneNumber: "+593-98-254-5785"
                  password: "ChangeMe123!"
                  state: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerResponse' }
        "400":
          description: Validation error (payload)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "409":
          description: Conflict (duplicate identification)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /customers/{id}:
    get:
      tags: [Customers]
      operationId: getCustomer
      summary: Get customer by id
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerResponse' }
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "400":
          description: Invalid id format
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    put:
      tags: [Customers]
      operationId: updateCustomer
      summary: Update customer
      description: |
        Updates customer and/or person profile fields.

        This operation behaves like a PATCH:
        - Omitted fields remain unchanged.
        - Provided fields are validated and then applied.
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerUpdateRequest' }
            examples:
              patchLike:
                value:
                  name: "Jose L."
                  state: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomerResponse' }
        "400":
          description: Validation error (payload)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "409":
          description: Conflict (duplicate identification)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    delete:
      tags: [Customers]
      operationId: deleteCustomer
      summary: Delete customer
      description: |
        Deletes a customer.

        Depending on your DB model, this may:
        - delete both customer and person, or
        - delete customer and leave person, or
        - reject if referenced by other resources.

        This API returns a delete receipt payload.
      parameters:
        - $ref: '#/components/parameters/CustomerId'
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteResponse' }
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "409":
          description: Conflict (cannot delete due to references)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        "400":
          description: Invalid id format
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  parameters:
    CustomerId:
      name: id
      in: path
      required: true
      description: Unique customer identifier (UUID).
      schema:
        type: string
        format: uuid

  schemas:
    CustomerCreateRequest:
      type: object
      required: [name, gender, age, identification, address, phoneNumber, password, state]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Full legal name.
        gender:
          type: string
          description: Gender code.
          pattern: "^(M|F|X)$"
          example: "M"
        age:
          type: integer
          minimum: 0
          maximum: 125
          example: 30
        identification:
          type: string
          description: Unique personal identification number/code.
          minLength: 3
          maxLength: 50
          example: "EC-0102030405"
        address:
          type: string
          minLength: 1
          maxLength: 200
          example: "Quito, Ecuador"
        phoneNumber:
          type: string
          description: Phone number (E.164 recommended).
          minLength: 3
          maxLength: 50
          example: "+593-98-254-5785"
        password:
          type: string
          description: Customer password (stored hashed).
          minLength: 8
          maxLength: 255
          example: "ChangeMe123!"
        state:
          type: boolean
          description: Whether the customer is active.

    CustomerUpdateRequest:
      type: object
      description: Optional fields; omitted fields remain unchanged.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        gender:
          type: string
          pattern: "^(M|F|X)$"
        age:
          type: integer
          minimum: 0
          maximum: 125
        identification:
          type: string
          minLength: 3
          maxLength: 50
        address:
          type: string
          minLength: 1
          maxLength: 200
        phoneNumber:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          description: New password value (stored hashed).
          minLength: 8
          maxLength: 255
        state:
          type: boolean

    CustomerResponse:
      type: object
      required: [id, name, identification, state]
      properties:
        id:
          type: string
          format: uuid
          description: Customer identifier.
        name:
          type: string
        gender:
          type: string
          description: "M/F/X"
        age:
          type: integer
        identification:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        state:
          type: boolean

    DeleteResponse:
      type: object
      required: [id, message, deletedAt]
      properties:
        id:
          type: string
          description: Identifier of the deleted resource (customer UUID).
        message:
          type: string
          description: Human readable result message.
        deletedAt:
          type: string
          format: date-time
          description: Deletion timestamp (UTC).

    Problem:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        instance: { type: string, format: uri }
      additionalProperties: true
